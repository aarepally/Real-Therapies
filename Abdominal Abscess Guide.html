<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdominal Abscess — Clinical Reference</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<meta name="ext-resource-dependency" content="assets/stopIT_subgroups.jpg" data-resource-id="stopitImg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: oklch(97% 0.012 75);
    --cream-dark: oklch(93% 0.016 70);
    --cream-border: oklch(87% 0.020 65);
    --ink: oklch(22% 0.015 50);
    --ink-mid: oklch(42% 0.012 50);
    --ink-light: oklch(60% 0.010 50);
    --crimson: oklch(42% 0.12 25);
    --crimson-light: oklch(92% 0.04 25);
    --crimson-mid: oklch(70% 0.09 25);
    --teal: oklch(48% 0.10 185);
    --teal-light: oklch(92% 0.04 185);
    --gold: oklch(62% 0.10 75);
    --gold-light: oklch(94% 0.04 75);
    --page-bg: var(--cream);
    --serif: 'Lora', Georgia, serif;
    --sans: 'Source Sans 3', system-ui, sans-serif;
  }

  html, body {
    min-height: 100vh;
    background: var(--page-bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
  }

  #root {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .site-header {
    background: var(--ink);
    color: var(--cream);
    padding: 18px 40px;
    display: flex;
    align-items: baseline;
    gap: 24px;
    border-bottom: 3px solid var(--crimson);
  }
  .site-header h1 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .site-header .subtitle {
    font-size: 13px;
    color: oklch(72% 0.008 50);
    font-style: italic;
    font-family: var(--serif);
  }
  .site-header .badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--crimson-mid);
    font-family: var(--sans);
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Tab nav ── */
  .tab-nav {
    background: var(--cream-dark);
    border-bottom: 1px solid var(--cream-border);
    display: flex;
    padding: 0 40px;
    gap: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 14px 22px 12px;
    font-family: var(--sans);
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink-mid);
    border-bottom: 3px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.02em;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active {
    color: var(--crimson);
    border-bottom-color: var(--crimson);
    font-weight: 600;
  }

  /* ── Layout ── */
  .page-content {
    flex: 1;
    padding: 36px 40px 60px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Section heading ── */
  .section-heading {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .section-sub {
    font-size: 13.5px;
    color: var(--ink-light);
    margin-bottom: 28px;
    font-style: italic;
    font-family: var(--serif);
  }

  /* ══════════════════════════════════
     TAB 1: GUIDED DECISION TOOL
  ══════════════════════════════════ */
  .stepper-track {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 32px;
  }
  .step-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-light);
    font-family: var(--sans);
  }
  .step-item.active { color: var(--crimson); }
  .step-item.done { color: var(--teal); }
  .step-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
  }
  .step-item.done .step-num {
    background: var(--teal);
    color: white;
    border-color: var(--teal);
  }
  .step-item.active .step-num {
    background: var(--crimson);
    color: white;
    border-color: var(--crimson);
  }
  .step-connector {
    flex: 1;
    height: 1px;
    background: var(--cream-border);
    margin: 0 10px;
    max-width: 60px;
  }

  .question-card {
    background: white;
    border: 1px solid var(--cream-border);
    border-radius: 6px;
    padding: 28px 32px 32px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px oklch(0% 0 0 / 0.05);
  }
  .question-label {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 20px;
    line-height: 1.4;
  }
  .question-label span.step-tag {
    display: inline-block;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--crimson);
    margin-bottom: 6px;
    display: block;
  }

  .option-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .option-btn {
    background: var(--cream);
    border: 1.5px solid var(--cream-border);
    border-radius: 5px;
    padding: 14px 16px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    text-align: left;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .option-btn:hover {
    border-color: var(--crimson-mid);
    background: var(--crimson-light);
    color: var(--crimson);
  }
  .option-btn .opt-icon {
    display: block;
    font-size: 11px;
    color: var(--ink-light);
    margin-top: 4px;
    font-weight: 400;
  }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    color: var(--ink-light);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
    padding: 4px 0;
  }
  .back-btn:hover { color: var(--ink); }

  /* Result card */
  .result-card {
    background: white;
    border: 1px solid var(--cream-border);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 2px 8px oklch(0% 0 0 / 0.06);
  }
  .result-header {
    background: var(--ink);
    color: var(--cream);
    padding: 20px 28px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .result-header .rh-label {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--crimson-mid);
    margin-bottom: 4px;
  }
  .result-header h2 {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 600;
    line-height: 1.3;
  }
  .result-header .rh-context {
    font-size: 13px;
    color: oklch(72% 0.008 50);
    margin-top: 6px;
    font-style: italic;
    font-family: var(--serif);
  }

  .result-body {
    padding: 24px 28px;
  }
  .regimen-section {
    margin-bottom: 24px;
  }
  .regimen-section:last-child { margin-bottom: 0; }
  .reg-title {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--cream-border);
  }
  .regimen-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .regimen-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 4px;
    background: var(--cream);
    border-left: 3px solid transparent;
  }
  .regimen-item.preferred { border-left-color: var(--crimson); }
  .regimen-item.alternative { border-left-color: var(--teal); background: var(--teal-light); }
  .regimen-item.note { border-left-color: var(--gold); background: var(--gold-light); }
  .reg-drug {
    font-family: var(--sans);
    font-size: 14.5px;
    font-weight: 600;
    color: var(--ink);
    flex: 1;
  }
  .reg-drug .operator {
    font-weight: 400;
    color: var(--ink-light);
    margin: 0 4px;
  }
  .reg-trade {
    font-size: 12.5px;
    font-weight: 400;
    color: var(--ink-light);
    font-style: italic;
    margin-left: 2px;
  }
  .reg-note {
    font-size: 12.5px;
    color: var(--ink-mid);
    margin-top: 3px;
    font-style: italic;
  }

  .duration-box {
    background: var(--cream-dark);
    border: 1px solid var(--cream-border);
    border-radius: 5px;
    padding: 14px 18px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .dur-num {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 700;
    color: var(--crimson);
    line-height: 1;
    flex-shrink: 0;
  }
  .dur-label {
    font-size: 13px;
    color: var(--ink-mid);
    line-height: 1.5;
  }
  .dur-label strong { color: var(--ink); font-weight: 600; }

  .coverage-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }
  .chip {
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--sans);
  }
  .chip-gn { background: oklch(90% 0.05 220); color: oklch(35% 0.10 220); }
  .chip-gp { background: oklch(91% 0.05 140); color: oklch(35% 0.10 140); }
  .chip-ana { background: oklch(91% 0.05 55); color: oklch(38% 0.10 55); }
  .chip-fun { background: oklch(90% 0.05 290); color: oklch(35% 0.10 290); }

  .restart-btn {
    margin-top: 20px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 4px;
    padding: 10px 22px;
    font-family: var(--sans);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.02em;
  }
  .restart-btn:hover { background: var(--crimson); }

  /* ══════════════════════════════════
     TAB 2: MICROBIOLOGY
  ══════════════════════════════════ */
  .micro-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }
  @media (max-width: 700px) { .micro-grid { grid-template-columns: 1fr; } }

  .micro-card {
    background: white;
    border: 1px solid var(--cream-border);
    border-radius: 6px;
    overflow: hidden;
  }
  .micro-card-head {
    padding: 14px 18px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .micro-card-head.community {
    background: var(--teal-light);
    color: var(--teal);
    border-bottom: 1px solid oklch(80% 0.06 185);
  }
  .micro-card-head.healthcare {
    background: var(--crimson-light);
    color: var(--crimson);
    border-bottom: 1px solid oklch(82% 0.06 25);
  }
  .micro-card-body { padding: 16px 18px; }
  .org-group {
    margin-bottom: 14px;
  }
  .org-group:last-child { margin-bottom: 0; }
  .org-group-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 6px;
  }
  .org-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .org-list li {
    font-size: 13.5px;
    color: var(--ink);
    display: block;
    padding-left: 14px;
    position: relative;
    line-height: 1.5;
  }
  .org-list li .pct {
    font-size: 12px;
    color: var(--ink-light);
    font-style: italic;
  }
  .org-list li::before {
    content: '—';
    color: var(--cream-border);
    position: absolute;
    left: 0;
  }

  .sources-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-top: 8px;
  }
  .source-tile {
    background: white;
    border: 1.5px solid var(--cream-border);
    border-radius: 5px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
  }
  .source-tile:hover {
    border-color: var(--crimson-mid);
    box-shadow: 0 2px 10px oklch(0% 0 0 / 0.07);
    transform: translateY(-1px);
  }
  .source-tile.selected {
    border-color: var(--crimson);
    background: var(--crimson-light);
  }
  .source-tile .st-name {
    font-family: var(--serif);
    font-size: 14.5px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .source-tile .st-detail {
    font-size: 12.5px;
    color: var(--ink-mid);
    line-height: 1.5;
  }
  .source-tile .st-arrow {
    font-size: 11px;
    color: var(--crimson);
    margin-top: 6px;
    font-weight: 600;
    font-family: var(--sans);
    letter-spacing: 0.04em;
  }

  /* Source detail drawer */
  .source-detail {
    margin-top: 20px;
    background: white;
    border: 1px solid var(--cream-border);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 2px 12px oklch(0% 0 0 / 0.07);
    animation: slideDown 0.18s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .sd-header {
    background: var(--ink);
    color: var(--cream);
    padding: 18px 24px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .sd-header h3 {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
  }
  .sd-header .sd-sub {
    font-size: 13px;
    color: oklch(72% 0.008 50);
    margin-top: 4px;
    font-style: italic;
    font-family: var(--serif);
  }
  .sd-close {
    background: none;
    border: none;
    color: oklch(65% 0.008 50);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0 2px;
    flex-shrink: 0;
  }
  .sd-close:hover { color: var(--cream); }
  .sd-body {
    padding: 22px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 640px) { .sd-body { grid-template-columns: 1fr; } }
  .sd-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--cream-border);
  }
  .sd-org-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 0;
  }
  .sd-org-list li {
    font-size: 13.5px;
    color: var(--ink);
    display: block;
    padding-left: 14px;
    position: relative;
    line-height: 1.5;
  }
  .sd-org-list li::before {
    content: '—';
    color: var(--cream-border);
    position: absolute;
    left: 0;
  }
  .sd-org-list li .pct {
    font-size: 12px;
    color: var(--ink-light);
    font-style: italic;
  }
  .sd-regimen-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sd-regimen-item {
    padding: 9px 13px;
    border-radius: 4px;
    background: var(--cream);
    border-left: 3px solid var(--crimson);
    font-size: 13.5px;
  }
  .sd-regimen-item.alt { border-left-color: var(--teal); background: var(--teal-light); }
  .sd-drug { font-weight: 600; color: var(--ink); }
  .sd-drug-trade { font-weight: 400; font-style: italic; color: var(--ink-light); font-size: 12px; margin-left: 3px; }
  .sd-drug-note { font-size: 12px; color: var(--ink-mid); margin-top: 2px; font-style: italic; }

  /* ══════════════════════════════════
     TAB 3: DURATION
  ══════════════════════════════════ */
  .duration-table-wrap {
    background: white;
    border: 1px solid var(--cream-border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead tr {
    background: var(--ink);
    color: var(--cream);
  }
  thead th {
    padding: 12px 18px;
    text-align: left;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  tbody tr {
    border-bottom: 1px solid var(--cream-border);
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--cream); }
  tbody td {
    padding: 12px 18px;
    font-size: 14px;
    color: var(--ink);
    vertical-align: top;
    line-height: 1.5;
  }
  tbody td:first-child {
    font-weight: 500;
  }
  td .dur-highlight {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 700;
    color: var(--crimson);
    margin-right: 4px;
  }

  .stopit-box {
    background: white;
    border: 1px solid var(--cream-border);
    border-radius: 6px;
    padding: 24px 28px;
    margin-bottom: 20px;
  }
  .stopit-box h3 {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--ink);
  }
  .stopit-stat-row {
    display: flex;
    gap: 32px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-block { text-align: center; }
  .stat-num {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 700;
    color: var(--crimson);
    line-height: 1;
  }
  .stat-desc {
    font-size: 12px;
    color: var(--ink-mid);
    margin-top: 4px;
    max-width: 120px;
  }
  .stopit-quote {
    border-left: 3px solid var(--cream-border);
    padding-left: 16px;
    margin: 16px 0;
    font-style: italic;
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink-mid);
    line-height: 1.6;
  }
  .stopit-quote cite {
    display: block;
    margin-top: 8px;
    font-size: 12px;
    font-style: normal;
    color: var(--ink-light);
  }
  .forest-img {
    width: 100%;
    border: 1px solid var(--cream-border);
    border-radius: 4px;
    margin-top: 12px;
  }

  /* ══════════════════════════════════
     TAB 4: PATHOGEN COVERAGE MATRIX
  ══════════════════════════════════ */
  .matrix-wrap {
    background: white;
    border: 1px solid var(--cream-border);
    border-radius: 6px;
    overflow: auto;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px oklch(0% 0 0 / 0.05);
  }
  .matrix-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .matrix-table thead tr:first-child th {
    background: var(--ink);
    color: var(--cream);
    padding: 10px 12px 8px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    white-space: nowrap;
    text-align: center;

function GuidedTab() {
  const [stepIdx, setStepIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const done = stepIdx >= STEPS.length;

  function pick(value) {
    const step = STEPS[stepIdx];
    const newAnswers = { ...answers, [step.id]: value };
    setAnswers(newAnswers);
    setStepIdx(stepIdx + 1);
  }

  function restart() {
    setStepIdx(0);
    setAnswers({});
  }

  function goBack() {
    if (stepIdx > 0) {
      const prevStep = STEPS[stepIdx - 1];
      const newAnswers = { ...answers };
      delete newAnswers[prevStep.id];
      setAnswers(newAnswers);
      setStepIdx(stepIdx - 1);
    }
  }

  return (
    <div>
      {/* Stepper */}
      <div className="stepper-track">
        {STEPS.map((s, i) => {
          const status = i < stepIdx ? 'done' : i === stepIdx && !done ? 'active' : '';
          return (
            <React.Fragment key={s.id}>
              <div className={`step-item ${status}`}>
                <div className="step-num">{i < stepIdx ? '✓' : i + 1}</div>
                {s.label}
              </div>
              {i < STEPS.length - 1 && <div className="step-connector" />}
            </React.Fragment>);

        })}
      </div>

      {done ?
      <ResultView answers={answers} onRestart={restart} /> :

      <div>
          {stepIdx > 0 &&
        <button className="back-btn" onClick={goBack}>← Back</button>
        }
          <div className="question-card">
            <div className="question-label">
              <span className="step-tag">{STEPS[stepIdx].tag}</span>
              {STEPS[stepIdx].question}
            </div>
            <div className="option-grid">
              {STEPS[stepIdx].options.map((opt) =>
            <button key={opt.value} className="option-btn" onClick={() => pick(opt.value)}>
                  {opt.label}
                  {opt.sub && <span className="opt-icon">{opt.sub}</span>}
                </button>
            )}
            </div>
          </div>
        </div>
      }
    </div>);

}

function CoverageTab() {
  const [filter, setFilter] = useState("all");

  const filterOptions = [
  { id: "all", label: "All organisms" },
  { id: "gn", label: "Gram-negative" },
  { id: "gp", label: "Gram-positive" },
  { id: "ana", label: "Anaerobes" },
  { id: "fungi", label: "Fungi" },
  { id: "resistant", label: "Resistant / MDR" }];


  const filterMap = {
    all: () => true,
    gn: (g) => g.group === "Gram-Negative Aerobes",
    gp: (g) => g.group === "Gram-Positive Aerobes",
    ana: (g) => g.group === "Anaerobes",
    fungi: (g) => g.group === "Fungi",
    resistant: (g, p) => p.name.includes("ESBL") || p.name.includes("MRSA") || p.name.includes("VRE") || p.name.includes("Acinetobacter") || p.name.includes("non-albicans")
  };

  const visibleGroups = PATHOGEN_GROUPS.map((g) => ({
    ...g,
    pathogens: g.pathogens.filter((p) => {
      if (filter === "resistant") return filterMap.resistant(g, p);
      return filterMap[filter](g);
    })
  })).filter((g) => g.pathogens.length > 0);

  return (
    <div>
      <p className="section-sub">Activity of key intra-abdominal infection antibiotics against common pathogens. Based on typical susceptibility patterns — always defer to local antibiogram and culture results.</p>

      <div className="matrix-filter-row">
        <span className="filter-label">Filter:</span>
        {filterOptions.map((f) =>
        <button key={f.id}

        onClick={() => setFilter(f.id)}>
            {f.label}
          </button>
        )}
      </div>

      <div className="matrix-wrap">
        <table className="matrix-table">
          <thead>
            <tr>
              <th style={{ textAlign: 'left' }}>Pathogen</th>
              {DRUGS.map((d) =>
              <th key={d.id} title={d.label + ' (' + d.trade + ')'}>
                  <div>{d.id}</div>
                  <div style={{ fontSize: 9, fontWeight: 400, opacity: 0.7, marginTop: 2 }}>{d.trade}</div>
                </th>
              )}
            </tr>
          </thead>
          <tbody>
            {visibleGroups.map((g) =>
            <React.Fragment key={g.group}>
                <tr className="group-spacer-row">
                  <td className="group-spacer" colSpan={DRUGS.length + 1}>{g.group}</td>
                </tr>
                {g.pathogens.map((p) =>
              <tr key={p.name}>

                      {p.sub && <span className="pathogen-sub">{p.sub}</span>}
                      {p.note && <span className="pathogen-sub" style={{ color: 'var(--crimson)', fontStyle: 'normal', fontWeight: 500 }}>{p.note}</span>}

        <div className="matrix-legend">

            <ul className="ref-list">
              {REFS.map((r) =>
            <li key={r.num}>
                  <span className="ref-num">[{r.num}]</span>
                  <span>{r.text}</span>
                </li>
            )}
            </ul>
          </div>
        }
      </main>

      <TweaksPanel>
        <TweakSection label="Display" />
        <TweakSlider label="Font Scale" value={t.fontScale} min={0.85} max={1.25} step={0.05}
        onChange={(v) => setTweak('fontScale', v)} />
        <TweakToggle label="Show References" value={t.showReferences}
        onChange={(v) => setTweak('showReferences', v)} />
      </TweaksPanel>
    </div>);

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
