<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    height: 100%;
    height: -webkit-fill-available;
  }
  body {
    height: 100%;
    min-height: -webkit-fill-available;
    width: 100%;
    background: oklch(18% 0.015 50);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, 'SF Pro', system-ui, sans-serif;
    overflow: hidden;
  }
  #root { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

  /* Phone shell — shown on desktop only */
  .phone-shell {
    position: relative;
    width: 393px;
    height: 852px;
    background: #1a1614;
    border-radius: 54px;
    box-shadow:
      0 0 0 1px oklch(35% 0.01 50),
      0 0 0 10px oklch(12% 0.01 50),
      0 0 0 11px oklch(30% 0.01 50),
      0 30px 80px rgba(0,0,0,0.7);
    overflow: hidden;
    flex-shrink: 0;
  }
  .phone-screen {
    position: absolute;
    inset: 0;
    border-radius: 54px;
    overflow: hidden;
    background: oklch(97% 0.012 75);
    display: flex;
    flex-direction: column;
  }

  /* On real mobile — fill the entire screen, no bezel */
  @media (max-width: 500px) {
    html {
      height: 100%;
      height: -webkit-fill-available;
      background: oklch(97% 0.012 75);
    }
    body {
      height: 100%;
      min-height: -webkit-fill-available;
      background: oklch(97% 0.012 75);
    }
    #root { height: 100%; align-items: stretch; }
    .outer { width: 100%; height: 100%; gap: 0; align-items: stretch; }
    .outer-label { display: none; }
    .phone-shell {
      width: 100%;
      height: 100%;
      flex: 1;
      border-radius: 0;
      box-shadow: none;
      background: oklch(97% 0.012 75);
      overflow: visible;
    }
    .phone-screen {
      border-radius: 0;
      position: relative;
      inset: auto;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .dynamic-island { display: none; }
    .status-bar { display: none; }
  }
  /* Dynamic island */
  .dynamic-island {
    position: absolute;
    top: 13px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }
  /* Scrollable screen content */
  .screen-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .screen-scroll::-webkit-scrollbar { display: none; }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px 0;
    height: 54px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .status-time {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--ink);
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Nav bar */
  .nav-bar {
    display: flex;
    align-items: center;
    padding: 4px 16px 8px;
    min-height: 44px;
    flex-shrink: 0;
    gap: 8px;
  }
  .nav-back {
    display: flex; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer;
    color: var(--crimson); font-size: 17px;
    padding: 8px 4px;
    font-family: -apple-system, system-ui, sans-serif;
  }
  .nav-title {
    flex: 1;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--ink);
  }
  .nav-spacer { width: 60px; }

  /* Bottom tab bar */
  .tab-bar {
    display: flex;
    background: oklch(97% 0.012 75 / 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid oklch(85% 0.015 65);
    padding: 8px 0 0;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    flex-shrink: 0;
    position: relative;
    z-index: 50;
  }
  /* Extend tab bar background into the iOS home indicator zone */
  .tab-bar::after {
    content: '';
    position: absolute;
    bottom: calc(-1 * env(safe-area-inset-bottom));
    left: 0; right: 0;
    height: env(safe-area-inset-bottom);
    background: oklch(97% 0.012 75 / 0.92);
    pointer-events: none;
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 2px 0;
    background: none;
    border: none;
  }
  .tab-icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .tab-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: oklch(62% 0.010 50);
  }
  .tab-item.active .tab-label { color: var(--crimson); }

  /* CSS vars on screen */
  .phone-screen {
    --cream: oklch(97% 0.012 75);
    --cream-dark: oklch(93% 0.016 70);
    --cream-border: oklch(87% 0.020 65);
    --ink: oklch(22% 0.015 50);
    --ink-mid: oklch(42% 0.012 50);
    --ink-light: oklch(60% 0.010 50);
    --crimson: oklch(42% 0.12 25);
    --crimson-light: oklch(92% 0.04 25);
    --crimson-mid: oklch(70% 0.09 25);
    --teal: oklch(48% 0.10 185);
    --teal-light: oklch(92% 0.04 185);
    --gold: oklch(62% 0.10 75);
    --gold-light: oklch(94% 0.04 75);
    --serif: 'Lora', Georgia, serif;
    --sans: 'Source Sans 3', system-ui, sans-serif;
  }

  /* ── HOME SCREEN ── */
  .home-hero {
    background: var(--ink);
    padding: 20px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  .home-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: var(--crimson);
    opacity: 0.15;
  }
  .home-hero::after {
    content: '';
    position: absolute;
    bottom: -30px; left: 20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: var(--teal);
    opacity: 0.12;
  }
  .app-wordmark {
    font-family: var(--serif);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--crimson-mid);
    margin-bottom: 6px;
    position: relative;
  }
  .app-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    color: oklch(96% 0.010 75);
    line-height: 1.25;
    position: relative;
    margin-bottom: 4px;
  }
  .app-subtitle {
    font-size: 13px;
    color: oklch(65% 0.008 50);
    font-family: var(--sans);
    position: relative;
    margin-bottom: 16px;
  }
  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: oklch(30% 0.010 50);
    border-radius: 12px;
    padding: 10px 14px;
    position: relative;
  }
  .search-bar input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-size: 15px;
    color: oklch(90% 0.008 75);
    font-family: var(--sans);
  }
  .search-bar input::placeholder { color: oklch(55% 0.008 50); }
  .search-icon { color: oklch(55% 0.008 50); font-size: 16px; flex-shrink: 0; }

  /* Quick access cards */
  .section-header {
    padding: 18px 20px 10px;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    font-family: var(--sans);
    letter-spacing: -0.3px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 16px 4px;
  }
  .quick-card {
    background: white;
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    border: 1px solid var(--cream-border);
    box-shadow: 0 1px 4px oklch(0% 0 0 / 0.04);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .quick-card:active { transform: scale(0.97); }
  .qc-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 10px;
  }
  .qc-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
    font-family: var(--sans);
  }
  .qc-sub {
    font-size: 11.5px;
    color: var(--ink-light);
    margin-top: 3px;
    line-height: 1.4;
    font-family: var(--sans);
  }

  /* List rows (iOS style) */
  .list-section {
    background: white;
    border-radius: 12px;
    margin: 8px 16px;
    overflow: hidden;
    border: 1px solid var(--cream-border);
  }
  .list-row {
    display: flex;
    align-items: center;
    padding: 13px 16px;
    gap: 12px;
    cursor: pointer;
    border-bottom: 0.5px solid var(--cream-border);
    background: white;
    transition: background 0.1s;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:active { background: var(--cream-dark); }
  .list-row-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .list-row-content { flex: 1; min-width: 0; }
  .list-row-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    font-family: var(--sans);
  }
  .list-row-sub {
    font-size: 12.5px;
    color: var(--ink-light);
    margin-top: 1px;
    font-family: var(--sans);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-row-chevron {
    color: oklch(75% 0.008 50);
    font-size: 14px;
    flex-shrink: 0;
  }

  /* ── SELECTOR SCREEN ── */
  .step-progress {
    display: flex;
    gap: 6px;
    padding: 8px 20px 16px;
  }
  .step-pip {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--cream-border);
    transition: background 0.2s;
  }
  .step-pip.done { background: var(--crimson); }
  .step-pip.active { background: var(--crimson-mid); }

  .selector-question {
    padding: 0 20px 20px;
  }
  .sq-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--crimson);
    margin-bottom: 6px;
    font-family: var(--sans);
  }
  .sq-question {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.35;
  }
  .selector-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 16px;
  }
  .sel-option {
    background: white;
    border: 1.5px solid var(--cream-border);
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.12s;
    box-shadow: 0 1px 3px oklch(0% 0 0 / 0.04);
  }
  .sel-option:active { background: var(--crimson-light); border-color: var(--crimson); transform: scale(0.985); }
  .sel-option-radio {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--cream-border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
  }
  .sel-option-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.3;
  }
  .sel-option-sub {
    font-size: 12.5px;
    color: var(--ink-light);
    margin-top: 3px;
    font-family: var(--sans);
    line-height: 1.4;
  }

  /* Result screen */
  .result-hero {
    background: var(--ink);
    margin: 0 16px 16px;
    border-radius: 16px;
    padding: 18px;
    overflow: hidden;
    position: relative;
  }
  .result-hero::before {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--crimson);
    opacity: 0.2;
  }
  .result-hero-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--crimson-mid);
    margin-bottom: 4px;
    font-family: var(--sans);
    position: relative;
  }
  .result-hero-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 600;
    color: oklch(95% 0.010 75);
    line-height: 1.3;
    position: relative;
  }
  .result-hero-ctx {
    font-size: 12px;
    color: oklch(60% 0.008 50);
    margin-top: 4px;
    font-style: italic;
    font-family: var(--serif);
    position: relative;
  }
  .regimen-card {
    background: white;
    border-radius: 14px;
    margin: 0 16px 12px;
    overflow: hidden;
    border: 1px solid var(--cream-border);
  }
  .rc-header {
    padding: 10px 14px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    border-bottom: 0.5px solid var(--cream-border);
    font-family: var(--sans);
    background: var(--cream-dark);
  }
  .rc-item {
    padding: 12px 14px;
    border-bottom: 0.5px solid var(--cream-border);
    border-left: 3px solid var(--crimson);
  }
  .rc-item.alt { border-left-color: var(--teal); }
  .rc-item:last-child { border-bottom: none; }
  .rc-drug {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    font-family: var(--sans);
  }
  .rc-trade {
    font-size: 12px;
    color: var(--ink-light);
    font-style: italic;
    margin-left: 3px;
    font-weight: 400;
  }
  .rc-note {
    font-size: 12px;
    color: var(--ink-mid);
    margin-top: 2px;
    font-style: italic;
    font-family: var(--sans);
  }
  .duration-pill {
    margin: 0 16px 12px;
    background: var(--crimson-light);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid oklch(84% 0.06 25);
  }
  .dur-num {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 700;
    color: var(--crimson);
    line-height: 1;
  }
  .dur-text {
    font-size: 13px;
    color: var(--crimson);
    font-family: var(--sans);
    line-height: 1.4;
  }
  .dur-text strong { font-weight: 600; display: block; }
  .coverage-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 16px;
  }
  .cov-chip {
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11.5px;
    font-weight: 500;
    font-family: var(--sans);
  }
  .chip-gn { background: oklch(90% 0.05 220); color: oklch(35% 0.10 220); }
  .chip-gp { background: oklch(91% 0.05 140); color: oklch(35% 0.10 140); }
  .chip-ana { background: oklch(91% 0.05 55); color: oklch(38% 0.10 55); }
  .chip-fun { background: oklch(90% 0.05 290); color: oklch(35% 0.10 290); }
  .restart-row {
    padding: 4px 16px 16px;
  }
  .restart-btn-ios {
    width: 100%;
    background: var(--ink);
    color: oklch(95% 0.010 75);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    letter-spacing: -0.1px;
  }

  /* ── COVERAGE SCREEN ── */
  .coverage-scroll-x {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 0 16px 16px;
  }
  .coverage-scroll-x::-webkit-scrollbar { display: none; }
  .cov-table {
    border-collapse: collapse;
    font-size: 12px;
    font-family: var(--sans);
    min-width: 560px;
  }
  .cov-table thead tr th {
    background: var(--ink);
    color: oklch(85% 0.008 75);
    padding: 8px 10px 10px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    text-align: center;
    border-right: 1px solid oklch(35% 0.01 50);
    vertical-align: bottom;
    line-height: 1.3;
  }
  .cov-table thead tr th:first-child { text-align: left; min-width: 130px; }
  .cov-table tbody tr { border-bottom: 0.5px solid var(--cream-border); }
  .cov-table tbody tr.group-row td {
    background: var(--cream-dark);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    padding: 6px 10px;
    text-align: left;
  }
  .cov-table tbody td {
    padding: 8px 10px;
    text-align: center;

  .cov-table tbody td:first-child { text-align: left; font-weight: 500; font-size: 12.5px; color: var(--ink); }
  .cov-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
  }
  .d4 { background: oklch(52% 0.14 155); color: white; }
  .d3 { background: oklch(70% 0.14 88); color: white; }
  .d2 { background: oklch(76% 0.08 50); color: white; }
  .d1 { background: oklch(88% 0.01 50); color: var(--ink-light); }
  .filter-scroll {
    display: flex;
    gap: 8px;
    padding: 4px 16px 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-pill {
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    background: white;
    border: 1.5px solid var(--cream-border);
    color: var(--ink-mid);
    cursor: pointer;
    font-family: var(--sans);
    flex-shrink: 0;
  }
  .filter-pill.active {
    background: var(--ink);
    border-color: var(--ink);
    color: oklch(95% 0.010 75);
  }

  /* ── MORE SCREEN ── */
  .more-header {
    padding: 8px 20px 16px;
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
  }
  .list-section-label {
    padding: 6px 20px 4px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-family: var(--sans);
  }

  /* ── SOURCE DETAIL ── */
  .source-detail-hero {
    background: var(--ink);
    padding: 16px 20px 20px;
  }
  .sdh-label {
    font-size: 10px;
    font-weight: 700;

// ── SELECTOR SCREEN ───────────────────────────────────────
function SelectorScreen({ navigate, initialResult }) {
  const [stepIdx, setStepIdx] = useState(initialResult ? 3 : 0);
  const [answers, setAnswers] = useState(initialResult || {});

  function pick(value) {
    const step = STEPS[stepIdx];
    const newAnswers = { ...answers, [step.id]: value };
    setAnswers(newAnswers);
    setStepIdx(stepIdx + 1);
  }
  function restart() { setStepIdx(0); setAnswers({}); }
  function goBack() {
    if (stepIdx > 0) {
      const prev = STEPS[stepIdx - 1];
      const a = { ...answers }; delete a[prev.id];
      setAnswers(a); setStepIdx(stepIdx - 1);
    } else { navigate("home"); }
  }

  const done = stepIdx >= STEPS.length;
  const data = done ? REGIMENS[answers.acquisition]?.[answers.risk]?.[answers.allergy] : null;

  return (
    <>
      <StatusBar />
      <div className="nav-bar">
        <button className="nav-back" onClick={goBack}>‹ {stepIdx === 0 ? "Home" : "Back"}</button>
        <div className="nav-title">{done ? "Recommendation" : "Antibiotic Selector"}</div>
        <div className="nav-spacer" />
      </div>
      <div className="screen-scroll">
        {!done &&
        <>
            <div className="step-progress">
              {STEPS.map((s, i) => <div key={s.id} className={`step-pip ${i < stepIdx ? 'done' : i === stepIdx ? 'active' : ''}`} />)}
            </div>
            <div className="selector-question">
              <div className="sq-tag">{STEPS[stepIdx].tag}</div>
              <div className="sq-question">{STEPS[stepIdx].question}</div>
            </div>
            <div className="selector-options">
              {STEPS[stepIdx].options.map((opt) =>
            <div key={opt.value} className="sel-option" onClick={() => pick(opt.value)}>
                  <div className="sel-option-radio" />
                  <div>
                    <div className="sel-option-title">{opt.label}</div>
                    <div className="sel-option-sub">{opt.sub}</div>
                  </div>
                </div>
            )}
            </div>
          </>
        }
        {done && data &&
        <>
            <div className="result-hero">
              <div className="result-hero-label">Recommended Regimen</div>
              <div className="result-hero-title">{data.title}</div>
              <div className="result-hero-ctx">{data.context}</div>
            </div>
            {data.preferred.length > 0 &&
          <div className="regimen-card">
                <div className="rc-header">Preferred</div>
                {data.preferred.map((r, i) =>
            <div key={i} className="rc-item">
                    <div className="rc-drug">{r.drug}<span className="rc-trade">({r.trade})</span></div>
                    {r.note && <div className="rc-note">{r.note}</div>}
                  </div>
            )}
              </div>
          }
            {data.alternatives.length > 0 &&
          <div className="regimen-card">
                <div className="rc-header">Alternatives</div>
                {data.alternatives.map((r, i) =>
            <div key={i} className="rc-item alt">
                    <div className="rc-drug">{r.drug}<span className="rc-trade">({r.trade})</span></div>
                    {r.note && <div className="rc-note">{r.note}</div>}
                  </div>
            )}
              </div>
          }
            {data.note &&
          <div className="regimen-card">
                <div className="rc-header">Special Considerations</div>
                <div className="rc-item" style={{ borderLeftColor: 'var(--gold)' }}>
                  <div className="rc-note" style={{ fontStyle: 'normal', fontSize: 13 }}>{data.note}</div>
                </div>
              </div>
          }
            <div className="duration-pill">
              <div className="dur-num">{data.duration}</div>
              <div className="dur-text"><strong>days of antibiotic therapy</strong>{data.durationNote}</div>

// ── SEARCH SCREEN ─────────────────────────────────────────
function SearchScreen({ navigate, initialQuery }) {
  const [q, setQ] = useState(initialQuery || "");
  const inputRef = useRef(null);
  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);

  const results = q.trim().length < 1 ? [] : SEARCH_INDEX.filter((item) =>
    item.searchText.includes(q.trim().toLowerCase())
  ).slice(0, 20);

  function highlight(text) {
    if (!q.trim()) return text;
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return text;
    return <>{text.slice(0, idx)}<em className="highlight">{text.slice(idx, idx + q.length)}</em>{text.slice(idx + q.length)}</>;
  }

  function handleResult(item) {
    if (item.screen === "source-detail") navigate("source-detail", { sourceName: item.sourceName, from: "search" });
    else if (item.screen === "selector" && item.acq) navigate("selector", { acq: item.acq, risk: item.risk, allergy: item.allergy });
    else navigate(item.screen);
  }

  const tagColor = { Regimen: "", Pathogen: "teal", Source: "", Duration: "gold" };

  return (
    <>
      <StatusBar />
      <div className="search-screen-bar">
        <div className="search-screen-input-wrap">

// ── ROOT APP ──────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showStatusBar": false,
  "showBezel": false,
  "darkMode": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState("home");
  const [screenProps, setScreenProps] = useState({});
  const [tab, setTab] = useState("home");

  function navigate(to, props = {}) {
    setScreenProps(props);
    setScreen(to);
    const tabMap = { home: "home", selector: "selector", coverage: "coverage", sources: "more", "source-detail": "more", duration: "more", search: "home" };
    if (tabMap[to]) setTab(tabMap[to]);
  }

  function goTab(t) {
    const screenMap = { home: "home", selector: "selector", coverage: "coverage", more: "more" };
    setTab(t);
    navigate(screenMap[t] || t);
  }

  const tabs = [
  { id: "home", label: "Home", Icon: IconHome },
  { id: "selector", label: "Selector", Icon: IconRx },
  { id: "coverage", label: "Coverage", Icon: IconGrid },
  { id: "more", label: "More", Icon: IconMore }];

  function handleSearch(q) { navigate("search", { initialQuery: q }); }

  function renderScreen() {
    switch (screen) {
      case "home": return <HomeScreen navigate={navigate} onSearch={handleSearch} />;
      case "selector": return <SelectorScreen navigate={navigate} initialResult={screenProps.acq ? { acquisition: screenProps.acq, risk: screenProps.risk, allergy: screenProps.allergy } : null} />;
      case "coverage": return <CoverageScreen navigate={navigate} />;
      case "sources": return <SourcesScreen navigate={navigate} />;
      case "source-detail": return <SourceDetailScreen navigate={navigate} sourceName={screenProps.sourceName} from={screenProps.from} />;
      case "duration": return <DurationScreen navigate={navigate} />;
      case "search": return <SearchScreen navigate={navigate} initialQuery={screenProps.initialQuery} />;
      case "more": return <MoreScreen navigate={navigate} />;
      default: return <HomeScreen navigate={navigate} onSearch={handleSearch} />;
    }
  }

  const showTabBar = !["search"].includes(screen);

  const screenStyle = tweaks.darkMode ? {
    '--cream': 'oklch(14% 0.010 50)',
    '--cream-dark': 'oklch(18% 0.012 50)',
    '--cream-border': 'oklch(28% 0.010 50)',
    '--ink': 'oklch(92% 0.008 75)',
    '--ink-mid': 'oklch(72% 0.008 60)',
    '--ink-light': 'oklch(55% 0.008 50)',
    background: 'oklch(14% 0.010 50)',
  } : {};

  return (
    <AppContext.Provider value={{ showStatusBar: tweaks.showStatusBar, darkMode: tweaks.darkMode }}>
    <div className="outer">
      <div className="phone-shell" style={tweaks.showBezel ? {} : {borderRadius:0, boxShadow:'none'}}>
        <div className="phone-screen" style={{...screenStyle, ...(tweaks.showBezel ? {} : {borderRadius:0})}}>
          {tweaks.showStatusBar && <div className="dynamic-island" />}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }} key={screen}>
            {renderScreen()}
          </div>
          {showTabBar &&
          <div className="tab-bar" style={tweaks.darkMode ? {background:'oklch(18% 0.012 50 / 0.95)', borderTopColor:'oklch(30% 0.010 50)'} : {}}>
              {tabs.map((t) =>
            <button key={t.id} className={`tab-item ${tab === t.id ? 'active' : ''}`} onClick={() => goTab(t.id)}>
                  <div className="tab-icon"><t.Icon active={tab === t.id} /></div>
                  <span className="tab-label" style={{ color: tab === t.id ? 'var(--crimson)' : 'oklch(62% 0.010 50)' }}>{t.label}</span>
                </button>
            )}
            </div>
          }
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="Display">
          <TweakToggle label="Status Bar & Island" value={tweaks.showStatusBar} onChange={v => setTweak('showStatusBar', v)} />
          <TweakToggle label="Phone Bezel" value={tweaks.showBezel} onChange={v => setTweak('showBezel', v)} />
          <TweakToggle label="Dark Mode" value={tweaks.darkMode} onChange={v => setTweak('darkMode', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
    </AppContext.Provider>);
}

// Mount after tweaks-panel.jsx has exported its components to window
function doMount() {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
if (typeof window.TweaksPanel === 'function') {
  doMount();
} else {
  document.addEventListener('tweaks-panel-ready', doMount, { once: true });
  setTimeout(() => {
    if (!document.getElementById('root').hasChildNodes()) doMount();
  }, 500);
}
</script>

    <strong>Add to Home Screen</strong>

  <button id="pwa-dismiss" aria-label="Dismiss">×</button>

<div id="pwa-offline-bar">⚡ You're offline — REAL Therapies is fully cached and available.</div>

<script>
(function () {
  // ── Service Worker registration ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[PWA] SW registered, scope:', reg.scope))
        .catch(err => console.warn('[PWA] SW registration failed:', err));
    });
  }

  // ── Offline / online detection ─────────────────────────
  const offlineBar = document.getElementById('pwa-offline-bar');
  function updateOnlineStatus() {
    if (!navigator.onLine) {
      offlineBar.classList.add('visible');
    } else {
      offlineBar.classList.remove('visible');
    }
  }
  window.addEventListener('online',  updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  // ── Install prompt ─────────────────────────────────────
  let deferredPrompt = null;
  const banner      = document.getElementById('pwa-banner');
  const installBtn  = document.getElementById('pwa-install-btn');
  const dismissBtn  = document.getElementById('pwa-dismiss');

  const dismissed = sessionStorage.getItem('pwa-banner-dismissed');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    if (!dismissed) {
      setTimeout(() => banner.classList.add('visible'), 2500);
    }
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    banner.classList.remove('visible');
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('[PWA] Install outcome:', outcome);
    deferredPrompt = null;
  });

  dismissBtn.addEventListener('click', () => {
    banner.classList.remove('visible');
    sessionStorage.setItem('pwa-banner-dismissed', '1');
  });

  if (window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true) {
    banner.style.display = 'none';
  }

  window.addEventListener('appinstalled', () => {
    console.log('[PWA] App installed!');
    banner.classList.remove('visible');
    deferredPrompt = null;
  });
})();
</script>
